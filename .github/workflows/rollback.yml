name: Rollback

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment (dev|qa|uat|prod)'
        required: true
      target_version:
        description: 'Target migration version to roll back to (e.g. v1.0.0)'
        required: true

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Sanity check Python scripts
        run: |
          python3 -m py_compile scripts/*.py
      - name: Verify secrets available
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        run: |
          python3 scripts/test_secrets.py
      - name: Replace <env> placeholders (input)
        run: |
          ENV_INPUT="${{ github.event.inputs.environment }}"
          echo "Replacing <env> with ${ENV_INPUT} in migrations/ddl and migrations/dml SQL files"
          find migrations/ddl migrations/dml -type f -name '*.sql' -print0 | xargs -0 -I{} bash -c "sed -i 's|<env>|${ENV_INPUT}|g' '{}'" || true
      - name: Run rollback script
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        run: |
          python3 scripts/deploy.py rollback "${{ github.event.inputs.environment }}" "${{ github.event.inputs.target_version }}"
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rollback-logs-${{ github.run_id }}
          path: artifacts/*.log
          if-no-files-found: ignore
