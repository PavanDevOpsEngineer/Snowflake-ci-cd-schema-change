name: Release Deploy (UAT)

on:
  pull_request:
    branches:
      - 'release/**'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: UAT
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      - name: Install dependencies
        run: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Sanity check Python scripts
        run: |
          python3 -m py_compile scripts/*.py
      - name: Verify secrets available
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
        run: |
          python3 scripts/test_secrets.py
      - name: Replace <env> placeholders (uat)
        run: |
          echo "Replacing <env> with uat in migrations/ddl and migrations/dml SQL files"
          find migrations/ddl migrations/dml -type f -name '*.sql' -print0 | xargs -0 sed -i 's|<env>|uat|g' || true
      - name: Replace <env> placeholders (uat)
        run: |
          echo "Replacing <env> with uat in SQL files"
          find migrations -type f -name '*.sql' -print0 | xargs -0 sed -i 's|<env>|uat|g' || true
          if [ -f scripts/provision_snowflake.sql ]; then sed -i 's|<env>|uat|g' scripts/provision_snowflake.sql || true; fi
      - name: Run deploy script (UAT)
        env:
          SNOWFLAKE_ACCOUNT: ${{ secrets.SNOWFLAKE_ACCOUNT }}
          SNOWFLAKE_USER: ${{ secrets.SNOWFLAKE_USER }}
          SNOWFLAKE_PASSWORD: ${{ secrets.SNOWFLAKE_PASSWORD }}
          SNOWFLAKE_WAREHOUSE: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
          SNOWFLAKE_ROLE: ${{ secrets.SNOWFLAKE_ROLE }}
          ENV_CONFIG: config/uat.yml
        run: |
          python3 scripts/deploy.py deploy uat
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-logs-${{ github.run_id }}
          path: artifacts/*.log
          if-no-files-found: ignore
